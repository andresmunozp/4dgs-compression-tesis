# balanced.yaml — Good balance between compression and quality
# Soft pruning + SH reduction to degree 1 + float16 + HexPlane quantize + zstd

strategies:
  - name: PruningStrategy
    params:
      opacity_threshold: 0.005
      max_gaussians: 150000

  - name: SHReductionStrategy
    params:
      target_sh_degree: 1

  - name: QuantizationStrategy
    params:
      attribute_dtypes:
        xyz: float16
        features_dc: float16
        features_rest: float16
        opacity: float16
        scaling: float16
        rotation: float16
      quantize_deformation: false

  - name: HexPlaneCompressionStrategy
    params:
      method: quantize

  - name: EntropyCodingStrategy
    params:
      algorithm: zlib
      level: 6
